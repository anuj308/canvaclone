services:
  api-gateway:
    build:
      context: ./api-gateway
    container_name: canva-api-gateway-dev
    environment:
      PORT: 5000
      NODE_ENV: development
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      DESIGN: http://design-service:5001
      UPLOAD: http://upload-service:5002
      SUBSCRIPTION: http://subscription-service:5003
    depends_on:
      - design-service
      - upload-service
      - subscription-service
    networks:
      - backend-net

  design-service:
    build:
      context: ./design-service
    container_name: canva-design-service-dev
    environment:
      PORT: 5001
      NODE_ENV: development
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/canvaclone}
    depends_on:
      - mongo
    networks:
      - backend-net

  upload-service:
    build:
      context: ./upload-service
    container_name: canva-upload-service-dev
    environment:
      PORT: 5002
      NODE_ENV: development
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/canvaclone}
      STABILITY_API_KEY: ${STABILITY_API_KEY:-}
      cloud_name: ${cloud_name:-}
      api_key: ${api_key:-}
      api_secret: ${api_secret:-}
    depends_on:
      - mongo
    networks:
      - backend-net

  subscription-service:
    build:
      context: ./subscription-service
    container_name: canva-subscription-service-dev
    environment:
      PORT: 5003
      NODE_ENV: development
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/canvaclone}
    depends_on:
      - mongo
    networks:
      - backend-net

  mongo:
    image: mongo:7
    container_name: canva-mongo-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - backend-net

  nginx:
    image: nginx:1.27-alpine
    container_name: canva-nginx-dev
    depends_on:
      - api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend-net

volumes:
  mongo-data:

networks:
  backend-net:
    driver: bridge